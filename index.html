<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph War</title>
    <style>
      :root {
        color-scheme: dark;
        --player-color: #ff4444;
        --player-color-dim: rgba(255, 68, 68, 0.18);
        --border-width: 16px;
        --hud-height: 108px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #0f141a;
        color: #cdd9e5;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        overflow: hidden;
      }
      #game {
        position: fixed;
        inset: 0;
        background: var(--player-color);
        transition: background 0.25s ease;
      }
      /* Map canvas — shrunk from the bottom to leave room for the HUD bar. */
      #game-stage {
        position: absolute;
        top: var(--border-width);
        left: var(--border-width);
        right: var(--border-width);
        bottom: var(--hud-height);
        border-radius: var(--border-width);
        overflow: hidden;
      }

      /* ── HUD bar ─────────────────────────────────────────────────── */
      #hud-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: var(--hud-height);
        display: flex;
        align-items: center;
        padding: 0 var(--border-width);
        gap: 16px;
      }

      .player-hud {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: stretch;
        z-index: 5;
        transition: opacity 0.25s ease;
      }
      #red-hud {
        --hud-color: #ff4444;
        --hud-color-dim: rgba(255, 68, 68, 0.18);
      }
      #blue-hud {
        --hud-color: #4488ff;
        --hud-color-dim: rgba(68, 136, 255, 0.18);
      }
      .player-hud.inactive {
        opacity: 0.38;
        pointer-events: none;
      }

      .hud-fire-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
        background: rgba(18, 26, 34, 0.92);
        border: 1px solid var(--hud-color);
        border-radius: 12px;
        padding: 8px 12px;
        box-shadow:
          0 0 12px var(--hud-color-dim),
          0 6px 20px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
      }
      .hud-prompt {
        font:
          600 22px/1 "Cambria Math",
          Georgia,
          serif;
        color: var(--hud-color);
        align-self: center;
        padding: 0 4px;
      }
      .hud-input {
        flex: 1;
        display: flex;
        align-items: center;
        background: #0c1116;
        border: 1px solid #243140;
        border-radius: 8px;
        padding: 7px 14px;
        font-size: 22px;
      }
      .hud-input .mq-input {
        width: 100%;
      }
      .hud-input .mq-editable-field,
      .hud-input .mq-editable-field.mq-focused {
        border: none;
        box-shadow: none;
        background: transparent;
        outline: none;
      }
      .hud-input .mq-cursor {
        border-left-color: #fff !important;
      }
      .hud-fire-btn {
        border: none;
        border-radius: 8px;
        padding: 0 20px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: var(--hud-color);
        cursor: pointer;
        white-space: nowrap;
      }
      .hud-fire-btn:active {
        transform: translateY(1px);
      }
      .hud-fire-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .hud-status {
        font-size: 12px;
        color: #8499ab;
        letter-spacing: 0.02em;
        text-align: center;
      }
      .hud-status .hint {
        color: #5e7081;
      }
      .hud-status code {
        background: #1a242e;
        padding: 1px 4px;
        border-radius: 3px;
        color: #9fd8b6;
        font-size: 11px;
      }

      /* ── Win banner ──────────────────────────────────────────────── */
      #win-banner {
        position: absolute;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 6;
        background: rgba(18, 26, 34, 0.95);
        border: 1px solid #2b3a49;
        border-radius: 16px;
        padding: 26px 40px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      }
      #win-banner[hidden] {
        display: none;
      }
      #win-title {
        margin: 0 0 6px;
        font-size: 32px;
      }
      #win-detail {
        margin: 0 0 16px;
        color: #9fb2c2;
      }
      #reset-btn {
        border: 1px solid #34506a;
        background: #14202b;
        color: #cdd9e5;
        border-radius: 8px;
        padding: 8px 18px;
        font-size: 14px;
        cursor: pointer;
      }
      #reset-btn:hover {
        background: #1a2a38;
      }

      /* ── Scoreboard pill ─────────────────────────────────────────────── */
      #scoreboard {
        flex: 0 0 auto;
        background: rgba(18, 26, 34, 0.92);
        border: 1px solid #2b3a49;
        border-radius: 20px;
        padding: 6px 16px;
        white-space: nowrap;
      }
      #scoreboard-text {
        font-size: 13px;
        font-weight: 600;
        color: #8499ab;
        letter-spacing: 0.03em;
      }

      /* ── Between-round splash ────────────────────────────────────────── */
      #round-splash {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 15, 20, 0.82);
        z-index: 7;
        pointer-events: none;
      }
      #round-splash[hidden] { display: none; }
      #splash-text {
        font-size: 28px;
        font-weight: 700;
        color: #cdd9e5;
        letter-spacing: 0.04em;
        text-align: center;
        line-height: 1.5;
      }

      /* ── Tutorial overlay ────────────────────────────────────────────── */
      #tutorial-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: calc(var(--hud-height) + 12px);
        z-index: 8;
        pointer-events: none;
      }
      #tutorial-overlay[hidden] { display: none; }
      #tutorial-box {
        background: rgba(18, 26, 34, 0.97);
        border: 1px solid #34506a;
        border-radius: 14px;
        padding: 18px 28px;
        max-width: 480px;
        pointer-events: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      #tutorial-text {
        margin: 0 0 14px;
        font-size: 15px;
        color: #cdd9e5;
        line-height: 1.6;
      }
      #tutorial-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      #tutorial-skip {
        border: 1px solid #2b3a49;
        background: transparent;
        color: #5e7081;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      #tutorial-next {
        border: none;
        background: #34506a;
        color: #cdd9e5;
        border-radius: 8px;
        padding: 6px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      #tutorial-next:hover { background: #3d5f7d; }

      /* ── Lobby screen ────────────────────────────────────────────────── */
      #lobby-screen {
        position: fixed;
        inset: 0;
        background: #0f141a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 10;
      }
      #lobby-screen[hidden] { display: none; }

      #lobby-title {
        font-size: 48px;
        font-weight: 800;
        letter-spacing: 0.08em;
        margin: 0;
      }
      #lobby-title .t-red { color: #ff4444; }
      #lobby-title .t-blue { color: #4488ff; }

      #lobby-tagline {
        font-size: 14px;
        color: #5e7081;
        margin: -24px 0 0;
        letter-spacing: 0.05em;
      }

      #lobby-config {
        display: flex;
        flex-direction: column;
        gap: 20px;
        background: rgba(18, 26, 34, 0.92);
        border: 1px solid #2b3a49;
        border-radius: 16px;
        padding: 28px 36px;
        min-width: 340px;
      }

      .lobby-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #5e7081;
        text-transform: uppercase;
        margin: 0 0 8px;
      }

      .lobby-btn-group {
        display: flex;
        gap: 8px;
      }

      .lobby-mode-btn,
      .lobby-rounds-btn {
        flex: 1;
        border: 1px solid #2b3a49;
        background: #0c1116;
        color: #8499ab;
        border-radius: 10px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: border-color 0.15s, color 0.15s, background 0.15s;
        text-align: center;
        position: relative;
      }
      .lobby-mode-btn:hover:not(:disabled),
      .lobby-rounds-btn:hover:not(:disabled) {
        border-color: #4488ff;
        color: #cdd9e5;
      }
      .lobby-mode-btn.active,
      .lobby-rounds-btn.active {
        border-color: #4488ff;
        background: rgba(68, 136, 255, 0.12);
        color: #cdd9e5;
      }
      .lobby-mode-btn:disabled,
      .lobby-rounds-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .coming-soon-badge {
        position: absolute;
        top: -8px;
        right: -4px;
        background: #2b3a49;
        color: #5e7081;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 2px 5px;
        border-radius: 4px;
        text-transform: uppercase;
        pointer-events: none;
      }

      .lobby-noturn-row {
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0.35;
      }
      .lobby-noturn-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: not-allowed;
      }
      .lobby-noturn-label {
        font-size: 13px;
        color: #8499ab;
        cursor: default;
      }
      .lobby-noturn-row .coming-soon-badge {
        position: static;
        display: inline-block;
      }

      #lobby-start-local {
        border: none;
        background: #4488ff;
        color: #fff;
        border-radius: 10px;
        padding: 13px 24px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.03em;
        transition: background 0.15s;
      }
      #lobby-start-local:hover {
        background: #2266dd;
      }

      #lobby-online {
        border: 1px solid #2b3a49;
        background: transparent;
        color: #5e7081;
        border-radius: 10px;
        padding: 10px 24px;
        font-size: 13px;
        font-weight: 600;
        cursor: not-allowed;
        opacity: 0.5;
        letter-spacing: 0.03em;
      }
    </style>
  </head>
  <body>
    <div id="lobby-screen">
      <h1 id="lobby-title">
        <span class="t-red">GRAPH</span><span class="t-blue"> WAR</span>
      </h1>
      <p id="lobby-tagline">Fire mathematical functions. Hit your opponent.</p>

      <div id="lobby-config">
        <!-- Mode -->
        <div>
          <p class="lobby-label">Game Mode</p>
          <div class="lobby-btn-group">
            <button id="lobby-mode-classic" class="lobby-mode-btn active">
              Classic VS
              <small style="display:block;font-size:11px;font-weight:400;color:#5e7081;margin-top:2px">One hit per round</small>
            </button>
            <button id="lobby-mode-hp" class="lobby-mode-btn" disabled>
              HP Mode
              <small style="display:block;font-size:11px;font-weight:400;color:#5e7081;margin-top:2px">Slope = damage</small>
              <span class="coming-soon-badge">Soon</span>
            </button>
          </div>
        </div>

        <!-- Rounds -->
        <div>
          <p class="lobby-label">Rounds</p>
          <div class="lobby-btn-group">
            <button id="lobby-rounds-3" class="lobby-rounds-btn active">Best of 3</button>
            <button id="lobby-rounds-5" class="lobby-rounds-btn">Best of 5</button>
          </div>
        </div>

        <!-- No-Turn modifier -->
        <div class="lobby-noturn-row">
          <input type="checkbox" id="lobby-noturn" disabled />
          <label for="lobby-noturn" class="lobby-noturn-label">No-Turn Mode (simultaneous fire)</label>
          <span class="coming-soon-badge">Soon</span>
        </div>

        <!-- Actions -->
        <button id="lobby-start-local">▶ Play Locally</button>
        <button id="lobby-online" disabled>Play Online — Coming Soon</button>
      </div>
    </div>

    <div id="game" hidden>
      <main id="game-stage"></main>

      <div id="hud-bar">
        <div id="red-hud" class="player-hud">
          <div class="hud-fire-row">
            <span class="hud-prompt">y =</span>
            <span id="red-input" class="hud-input"></span>
            <button id="red-fire-btn" class="hud-fire-btn">Fire</button>
          </div>
          <div id="red-status" class="hud-status"></div>
        </div>

        <div id="scoreboard">
          <span id="scoreboard-text">RED 0 — BLUE 0 · Round 1/3</span>
        </div>

        <div id="blue-hud" class="player-hud inactive">
          <div class="hud-fire-row">
            <span class="hud-prompt">y =</span>
            <span id="blue-input" class="hud-input"></span>
            <button id="blue-fire-btn" class="hud-fire-btn">Fire</button>
          </div>
          <div id="blue-status" class="hud-status"></div>
        </div>
      </div>

      <div id="win-banner" hidden>
        <h2 id="win-title"></h2>
        <p id="win-detail"></p>
        <button id="reset-btn">Back to Lobby</button>
      </div>

      <div id="round-splash" hidden>
        <p id="splash-text"></p>
      </div>

      <div id="tutorial-overlay" hidden>
        <div id="tutorial-box">
          <p id="tutorial-text"></p>
          <div id="tutorial-actions">
            <button id="tutorial-skip">Skip tutorial</button>
            <button id="tutorial-next">OK</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
