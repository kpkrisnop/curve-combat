<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph War</title>
    <style>
      :root {
        color-scheme: dark;
        --player-color: #ff4444;
        --player-color-dim: rgba(255, 68, 68, 0.18);
        --border-width: 16px;
        --hud-height: 108px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        background: #0f141a;
        color: #cdd9e5;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        overflow: hidden;
      }
      #game {
        position: fixed;
        inset: 0;
        background: var(--player-color);
        transition: background 0.25s ease;
      }
      /* Map canvas — shrunk from the bottom to leave room for the HUD bar. */
      #game-stage {
        position: absolute;
        top: var(--border-width);
        left: var(--border-width);
        right: var(--border-width);
        bottom: var(--hud-height);
        border-radius: var(--border-width);
        overflow: hidden;
      }

      /* ── HUD bar ─────────────────────────────────────────────────── */
      #hud-bar {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: var(--hud-height);
        display: flex;
        align-items: center;
        padding: 0 var(--border-width);
        gap: 16px;
      }

      .player-hud {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: stretch;
        z-index: 5;
        transition: opacity 0.25s ease;
      }
      #red-hud {
        --hud-color: #ff4444;
        --hud-color-dim: rgba(255, 68, 68, 0.18);
      }
      #blue-hud {
        --hud-color: #4488ff;
        --hud-color-dim: rgba(68, 136, 255, 0.18);
      }
      .player-hud.inactive {
        opacity: 0.38;
        pointer-events: none;
      }

      .hud-fire-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
        background: rgba(18, 26, 34, 0.92);
        border: 1px solid var(--hud-color);
        border-radius: 12px;
        padding: 8px 12px;
        box-shadow:
          0 0 12px var(--hud-color-dim),
          0 6px 20px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
      }
      .hud-prompt {
        font:
          600 22px/1 "Cambria Math",
          Georgia,
          serif;
        color: var(--hud-color);
        align-self: center;
        padding: 0 4px;
      }
      .hud-input {
        flex: 1;
        display: flex;
        align-items: center;
        background: #0c1116;
        border: 1px solid #243140;
        border-radius: 8px;
        padding: 7px 14px;
        font-size: 22px;
      }
      .hud-input .mq-input {
        width: 100%;
      }
      .hud-input .mq-editable-field,
      .hud-input .mq-editable-field.mq-focused {
        border: none;
        box-shadow: none;
        background: transparent;
        outline: none;
      }
      .hud-input .mq-cursor {
        border-left-color: #fff !important;
      }
      .hud-input .mq-input {
        position: relative;
      }
      .mq-placeholder {
        position: absolute;
        left: 2px;
        top: 50%;
        transform: translateY(-50%);
        color: #5e7081;
        font-size: 16px;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        pointer-events: none;
        white-space: nowrap;
      }
      .hud-fire-btn {
        border: none;
        border-radius: 8px;
        padding: 0 20px;
        font-size: 15px;
        font-weight: 600;
        color: #fff;
        background: var(--hud-color);
        cursor: pointer;
        white-space: nowrap;
      }
      .hud-fire-btn:active {
        transform: translateY(1px);
      }
      .hud-fire-btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .hud-status {
        font-size: 12px;
        color: #8499ab;
        letter-spacing: 0.02em;
        text-align: center;
      }
      .hud-status .hint {
        color: #5e7081;
      }
      .hud-status code {
        background: #1a242e;
        padding: 1px 4px;
        border-radius: 3px;
        color: #9fd8b6;
        font-size: 11px;
      }

      /* ── Win banner ──────────────────────────────────────────────── */
      #win-banner {
        position: absolute;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 6;
        background: rgba(18, 26, 34, 0.95);
        border: 1px solid #2b3a49;
        border-radius: 16px;
        padding: 26px 40px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      }
      #win-banner[hidden] {
        display: none;
      }
      #win-title {
        margin: 0 0 6px;
        font-size: 32px;
      }
      #win-detail {
        margin: 0 0 16px;
        color: #9fb2c2;
      }
      #reset-btn {
        border: 1px solid #34506a;
        background: #14202b;
        color: #cdd9e5;
        border-radius: 8px;
        padding: 8px 18px;
        font-size: 14px;
        cursor: pointer;
      }
      #reset-btn:hover {
        background: #1a2a38;
      }

      /* ── Scoreboard pill ─────────────────────────────────────────────── */
      #scoreboard {
        flex: 0 0 auto;
        background: rgba(18, 26, 34, 0.92);
        border: 1px solid #2b3a49;
        border-radius: 20px;
        padding: 6px 16px;
        white-space: nowrap;
      }
      #scoreboard-text {
        font-size: 13px;
        font-weight: 600;
        color: #8499ab;
        letter-spacing: 0.03em;
      }

      /* ── Between-round splash ────────────────────────────────────────── */
      #round-splash {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 15, 20, 0.82);
        z-index: 7;
        pointer-events: none;
      }
      #round-splash[hidden] { display: none; }
      #splash-text {
        font-size: 28px;
        font-weight: 700;
        color: #cdd9e5;
        letter-spacing: 0.04em;
        text-align: center;
        line-height: 1.5;
      }

      /* ── Tutorial overlay ────────────────────────────────────────────── */
      #tutorial-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: calc(var(--hud-height) + 12px);
        z-index: 8;
        pointer-events: none;
      }
      #tutorial-overlay[hidden] { display: none; }
      #tutorial-box {
        background: rgba(18, 26, 34, 0.97);
        border: 1px solid #34506a;
        border-radius: 14px;
        padding: 18px 28px;
        max-width: 480px;
        pointer-events: auto;
        box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      }
      #tutorial-text {
        margin: 0 0 14px;
        font-size: 15px;
        color: #cdd9e5;
        line-height: 1.6;
      }
      #tutorial-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      #tutorial-skip {
        border: 1px solid #2b3a49;
        background: transparent;
        color: #5e7081;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      #tutorial-next {
        border: none;
        background: #34506a;
        color: #cdd9e5;
        border-radius: 8px;
        padding: 6px 18px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      #tutorial-next:hover { background: #3d5f7d; }

      /* ── Lobby screen (layout only; visuals via design-foundation primitives) ── */
      #lobby-screen {
        position: fixed;
        inset: 0;
        background: var(--gw-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--gw-space-7);
        z-index: var(--gw-z-lobby);
      }
      #lobby-screen[hidden] { display: none; }

      #lobby-title {
        font-size: var(--gw-fs-2xl);
        font-weight: 800;
        letter-spacing: 0.08em;
        margin: 0;
      }
      #lobby-title .t-red { color: var(--gw-red); }
      #lobby-title .t-blue { color: var(--gw-blue); }

      #lobby-tagline {
        font-size: 14px;
        color: var(--gw-text-faint);
        margin: -24px 0 0;
        letter-spacing: 0.05em;
      }

      /* Panel chrome comes from .gw-panel; this only sets lobby-specific layout. */
      #lobby-config {
        display: flex;
        flex-direction: column;
        gap: var(--gw-space-5);
        padding: var(--gw-space-6) var(--gw-space-7);
        min-width: 340px;
      }

      .lobby-btn-group {
        display: flex;
        gap: var(--gw-space-2);
      }


      /* ── HP bars (HP Mode only) — overlaid on the top of the map ─────────
         Inset 8px inside the map (which is itself inset 16px with a 16px
         radius), so each bar's OUTER top corner uses radius 16-8 = 8px to sit
         concentric with the map's rounded corner. */
      #hp-overlay {
        position: absolute;
        top: calc(var(--border-width) + 8px);
        left: calc(var(--border-width) + 8px);
        right: calc(var(--border-width) + 8px);
        display: flex;
        justify-content: space-between;
        gap: 16px;
        z-index: 5;
        pointer-events: none;
      }
      .hp-bar-wrap {
        position: relative;
        width: 40%;
        height: 26px;
        border-radius: 5px;
        background: rgba(10, 15, 20, 0.78);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.08),
          0 4px 14px rgba(0, 0, 0, 0.45);
      }
      .hp-bar-wrap[hidden] { display: none; }
      #red-hp-bar-wrap { --hp-fill: #ff4444; border-top-left-radius: 8px; }
      #blue-hp-bar-wrap { --hp-fill: #4488ff; border-top-right-radius: 8px; }
      .hp-bar-track {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        overflow: hidden;
        display: flex;
      }
      .hp-left .hp-bar-track { justify-content: flex-start; }
      .hp-right .hp-bar-track { justify-content: flex-end; }
      .hp-bar {
        height: 100%;
        width: 100%;
        background: var(--hp-fill);
        transition: width 0.25s ease;
      }
      .hp-label {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        white-space: nowrap;
      }
      .hp-left .hp-label { right: 9px; }
      .hp-right .hp-label { left: 9px; }
    </style>
  </head>
  <body>
    <div id="lobby-screen">
      <h1 id="lobby-title">
        <span class="t-red">GRAPH</span><span class="t-blue"> WAR</span>
      </h1>
      <p id="lobby-tagline">Fire mathematical functions. Hit your opponent.</p>

      <div id="lobby-config" class="gw-panel">
        <!-- Mode -->
        <div>
          <p class="gw-label">Game Mode</p>
          <div class="lobby-btn-group">
            <button id="lobby-mode-classic" class="gw-card is-active">
              Classic VS
              <span class="gw-card__hint">One hit per round</span>
            </button>
            <button id="lobby-mode-hp" class="gw-card">
              HP Mode
              <span class="gw-card__hint">Slope = damage</span>
            </button>
          </div>
        </div>

        <!-- Rounds -->
        <div>
          <p class="gw-label">Rounds</p>
          <div class="lobby-btn-group">
            <button id="lobby-rounds-3" class="gw-card is-active">Best of 3</button>
            <button id="lobby-rounds-5" class="gw-card">Best of 5</button>
          </div>
        </div>

        <!-- No-Turn modifier -->
        <div class="gw-toggle">
          <input type="checkbox" id="lobby-noturn" />
          <label for="lobby-noturn">No-Turn Mode (simultaneous fire)</label>
        </div>

        <!-- Turn Timer -->
        <div class="lobby-turn-timer-row" style="display:flex;align-items:center;gap:10px;margin:8px 0">
          <p class="lobby-label" style="margin:0;white-space:nowrap">Turn Timer</p>
          <button id="lobby-timer-down" type="button"
            style="border:1px solid #263041;background:transparent;color:#cdd9e5;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:1rem">−</button>
          <span id="lobby-timer-val"
            style="min-width:42px;text-align:center;color:#cdd9e5;font-size:0.9rem">60 s</span>
          <button id="lobby-timer-up" type="button"
            style="border:1px solid #263041;background:transparent;color:#cdd9e5;border-radius:4px;padding:2px 10px;cursor:pointer;font-size:1rem">+</button>
          <small style="color:#5e7081;font-size:11px">(turn-based only · min 15 s)</small>
        </div>

        <!-- Arena settings + live preview (functional; visual polish deferred) -->
        <div id="settings-panel">
          <p class="gw-label">Arena</p>
          <canvas id="arena-preview" class="gw-preview" width="360" height="210"></canvas>
          <div id="arena-readout" class="gw-readout"></div>
          <div class="gw-seed-row">
            <code id="arena-seed" class="gw-code"></code>
            <button id="arena-reroll" type="button" class="gw-btn gw-btn--ghost gw-btn--sm">Reroll</button>
          </div>
          <div id="arena-controls" class="gw-controls"></div>
        </div>

        <!-- Actions -->
        <button id="lobby-start-local" class="gw-btn gw-btn--primary">▶ Play Locally</button>
        <button id="lobby-online" class="gw-btn gw-btn--ghost">Play Online</button>
      </div>
    </div>

    <div id="game" hidden>
      <main id="game-stage"></main>

      <!-- HP bars overlaid on the top of the map (HP Mode only). -->
      <div id="hp-overlay">
        <div id="red-hp-bar-wrap" class="hp-bar-wrap hp-left" hidden>
          <div class="hp-bar-track"><div id="red-hp-bar" class="hp-bar"></div></div>
          <span id="red-hp-label" class="hp-label">100 HP</span>
        </div>
        <div id="blue-hp-bar-wrap" class="hp-bar-wrap hp-right" hidden>
          <div class="hp-bar-track"><div id="blue-hp-bar" class="hp-bar"></div></div>
          <span id="blue-hp-label" class="hp-label">100 HP</span>
        </div>
      </div>

      <div id="hud-bar">
        <div id="red-hud" class="player-hud">
          <div class="hud-fire-row">
            <span class="hud-prompt">y =</span>
            <span id="red-input" class="hud-input"></span>
            <button id="red-fire-btn" class="hud-fire-btn">Fire</button>
          </div>
          <div id="red-status" class="hud-status"></div>
        </div>

        <div id="scoreboard">
          <span id="scoreboard-text">RED 0 — BLUE 0 · Round 1/3</span>
        </div>

        <div id="blue-hud" class="player-hud inactive">
          <div class="hud-fire-row">
            <span class="hud-prompt">y =</span>
            <span id="blue-input" class="hud-input"></span>
            <button id="blue-fire-btn" class="hud-fire-btn">Fire</button>
          </div>
          <div id="blue-status" class="hud-status"></div>
        </div>
      </div>

      <div id="win-banner" hidden>
        <h2 id="win-title"></h2>
        <p id="win-detail"></p>
        <button id="reset-btn">Back to Lobby</button>
      </div>

      <div id="round-splash" hidden>
        <p id="splash-text"></p>
      </div>

      <div id="tutorial-overlay" hidden>
        <div id="tutorial-box">
          <p id="tutorial-text"></p>
          <div id="tutorial-actions">
            <button id="tutorial-skip">Skip tutorial</button>
            <button id="tutorial-next">OK</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
