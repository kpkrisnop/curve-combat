<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph War — Shooting Prototype</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: #0f141a;
        color: #cdd9e5;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
      }
      #game { position: fixed; inset: 0; }
      #game-stage { position: absolute; inset: 0; }

      #game-hud {
        position: absolute;
        left: 50%;
        bottom: 22px;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        z-index: 5;
        pointer-events: none;
      }
      #fire-row {
        display: flex;
        align-items: stretch;
        gap: 8px;
        background: rgba(18, 26, 34, 0.92);
        border: 1px solid #2b3a49;
        border-radius: 12px;
        padding: 8px 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
      }
      #fire-row .prompt {
        font: 600 18px/1 "Cambria Math", Georgia, serif;
        color: #7f93a6;
        align-self: center;
        padding: 0 4px;
      }
      #fire-input {
        min-width: 280px;
        display: flex;
        align-items: center;
        background: #0c1116;
        border: 1px solid #243140;
        border-radius: 8px;
        padding: 4px 10px;
        font-size: 20px;
      }
      #fire-input .mq-input { width: 100%; }
      /* White caret for contrast against the dark field. */
      #fire-input .mq-cursor { border-color: #fff; }
      #fire-btn {
        border: none;
        border-radius: 8px;
        padding: 0 20px;
        font-size: 15px;
        font-weight: 600;
        color: #04110a;
        background: linear-gradient(180deg, #58e08f, #28b46a);
        cursor: pointer;
      }
      #fire-btn:active { transform: translateY(1px); }
      #fire-btn:disabled { opacity: 0.5; cursor: default; }

      #game-status {
        font-size: 13px;
        color: #8499ab;
        letter-spacing: 0.02em;
      }
      #game-status .hint { color: #5e7081; }
      #game-status code {
        background: #1a242e;
        padding: 1px 5px;
        border-radius: 4px;
        color: #9fd8b6;
        font-size: 12px;
      }

      #win-banner {
        position: absolute;
        left: 50%;
        top: 38%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 6;
        background: rgba(18, 26, 34, 0.95);
        border: 1px solid #2b4a39;
        border-radius: 16px;
        padding: 26px 40px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      }
      #win-banner[hidden] { display: none; }
      #win-banner h2 { margin: 0 0 6px; font-size: 28px; color: #6ee7a3; }
      #win-banner p { margin: 0 0 16px; color: #9fb2c2; }
      #reset-btn {
        border: 1px solid #34506a;
        background: #14202b;
        color: #cdd9e5;
        border-radius: 8px;
        padding: 8px 18px;
        font-size: 14px;
        cursor: pointer;
      }
      #reset-btn:hover { background: #1a2a38; }
    </style>
  </head>
  <body>
    <div id="game">
      <main id="game-stage"></main>
      <div id="game-hud">
        <div id="fire-row">
          <span class="prompt">y =</span>
          <span id="fire-input"></span>
          <button id="fire-btn">Fire</button>
        </div>
        <div id="game-status"></div>
      </div>
      <div id="win-banner" hidden>
        <h2>Targets cleared!</h2>
        <p id="win-detail"></p>
        <button id="reset-btn">Play again</button>
      </div>
    </div>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
